<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXELI AR | Masada Gör</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0A0A0B; font-family: 'Montserrat', sans-serif; color: white; -webkit-tap-highlight-color: transparent; }
        
        /* AR UI KATMANI (Overlay) */
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; z-index: 10; }
        
        .header { text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .header h1 { margin: 0; font-size: 1.8rem; color: #FF5A00; font-weight: 800; letter-spacing: 1px;}
        .header p { margin: 15px 0 0; font-size: 0.95rem; background: rgba(0,0,0,0.7); padding: 12px 18px; border-radius: 12px; display: inline-block; backdrop-filter: blur(5px); font-weight: 600; line-height: 1.4; pointer-events: auto; }
        
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 90, 0, 0.2); border-top: 4px solid #FF5A00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Geri Dön Butonu */
        .back-btn { pointer-events: auto; background: #fff; color: #000; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: 700; font-size: 0.9rem; position: absolute; top: 20px; left: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* THREE.JS START AR BUTONU ÖZELLEŞTİRMESİ */
        #ARButton { background-color: #FF5A00 !important; color: #fff !important; font-weight: 800 !important; border-radius: 50px !important; padding: 18px 30px !important; border: none !important; bottom: 40px !important; opacity: 1 !important; pointer-events: auto; box-shadow: 0 10px 20px rgba(255, 90, 0, 0.3) !important; letter-spacing: 1px !important; }
    </style>
</head>
<body>
    
    <div id="ui-container">
        <a href="index.html" class="back-btn">← Menü</a>
        <div class="header">
            <h1>VOXELI AR</h1>
            <p id="instruction-text">Model Yükleniyor... Lütfen bekleyin.</p>
        </div>
        <div id="loader">
            <div class="spinner"></div>
        </div>
    </div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        } 
    }
    </script>
    <script type="module" src="ar-app.js"></script>
</body>
</html>
