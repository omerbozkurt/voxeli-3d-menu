<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOXELI AR | Masada Gör</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background-color: #0A0A0B; font-family: 'Montserrat', sans-serif; color: white; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; z-index: 10; }
        .header { text-align: center; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .header h1 { margin: 0; font-size: 1.5rem; color: #FF5A00; font-weight: 800; }
        .header p { margin: 10px 0 0; font-size: 0.9rem; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 12px; display: inline-block; backdrop-filter: blur(5px); font-weight: 600; }
        #loader { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255, 90, 0, 0.2); border-top: 3px solid #FF5A00; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #ARButton { background-color: #111827 !important; color: #fff !important; font-weight: 700 !important; border-radius: 12px !important; padding: 15px 30px !important; border: 1px solid #E5E7EB !important; bottom: 40px !important; opacity: 1 !important; }
    </style>
</head>
<body>
    <div id="ui-container">
        <div class="header">
            <h1>VOXELI AR</h1>
            <p id="instruction-text">Yüzey aranıyor... Kamerayı masada gezdirin.</p>
        </div>
        <div id="loader">
            <div class="spinner"></div>
            <span style="font-weight: 600; font-size: 0.9rem;">Model Yükleniyor...</span>
        </div>
    </div>

    <script type="importmap">
    { 
        "imports": { 
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        } 
    }
    </script>
    <script type="module" src="ar-app.js"></script>
</body>
</html>
